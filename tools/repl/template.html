<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>LaTeX DSL Preview</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$']]
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <h3>LaTeX Output</h3>

  <div>
    $$
    {{LATEX}}
    $$
  </div>
</body>
</html>
